<!-- Contact Section -->
<section id="contact">
  <div class="container">
    <div class="row">
      <div class="col-lg-12 text-center">
        <h2>Contactame</h2>
        <hr class="star-primary">
      </div>
      <div class="row">
  <div class="col-lg-8 col-lg-offset-2 text-center">
    <p class="contact-intro">
      ¿Necesitas un dashboard, automatizar reportes, analizar tus datos o desarrollar una solución a la medida?
      Déjame un mensaje y con gusto me pondré en contacto para brindarte más información, agendar una reunión o preparar una cotización sin compromiso.
    </p>
  </div>
</div>
    </div>
    <div class="row">
      <div class="col-lg-8 col-lg-offset-2">
        <form action="https://formspree.io/f/xrevrnyb" method="POST" name="sentMessage" id="contactForm" novalidate>
          <div class="row control-group">
            <div class="form-group col-xs-12 floating-label-form-group controls">
              <label for="name">Nombre</label>
              <input type="text" name="name" class="form-control" placeholder="Nombre" id="name" required
                data-validation-required-message="Por favor pon tu nombre">
              <p class="help-block text-danger"></p>
            </div>
          </div>
          <div class="row control-group">
            <div class="form-group col-xs-12 floating-label-form-group controls">
              <label for="email">Correo electrónico</label>
              <input type="email" name="_replyto" class="form-control" placeholder="Correo electrónico" id="email" required
                data-validation-required-message="Por favor escribe un correo electrónico valido.">
              <p class="help-block text-danger"></p>
            </div>
          </div>
          <div>
            <input type="hidden" name="_subject" value="New submission!">
            <input type="text" name="_gotcha" style="display:none" />
          </div>
          <div class="row control-group">
            <div class="form-group col-xs-12 floating-label-form-group controls">
              <label for="message">Mensaje</label>
              <textarea rows="5" name="message" class="form-control" placeholder="Mensaje" id="message" required
                data-validation-required-message="Por favor escribe un mensaje."></textarea>
              <p class="help-block text-danger"></p>
            </div>
          </div>
          <br>
          <div id="success"></div>
          <div class="row">
            <div class="form-group col-xs-12">
              <button type="submit" class="btn btn-success btn-lg">Enviar</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
